<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="main-container">
        <div class="login-section">
            <img src="images/logo.png" alt="Logo" class="logo">
            <h2>Welcome!</h2>
            <p>Please create an account to start using SCAI.</p>
            <form>
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" value="John">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" value="Doe">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="example@gmail.com">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password">
                <div class="agree-terms">
                    <label><input type="checkbox" id="agree-terms"> I agree to the <a href="settingshtml/Ts.html">Terms</a> and <a href="settingshtml/Cs.html">Conditions</a></label>
                </div>
                <button type="submit">Sign Up</button>
                <button type="button" class="google-login">Google Login</button>
                <button type="button" onclick="window.location.href='main.html'">Go to Main Page</button>
            </form>
        </div>
    </div>
</body>
</html>
