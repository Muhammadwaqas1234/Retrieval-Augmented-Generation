<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password — SCAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/scai.css">
</head>
<body>
    <div class="topbar">
        <a class="brand" href="{{ url_for('index') }}">
            <img src="/static/img/logo.png" alt="SCAI">
            <div><strong>SCAI</strong><span>Standards &amp; Codes AI</span></div>
        </a>
        <a class="back" href="{{ url_for('account') }}">← Back to account</a>
    </div>

    <div class="page">
        <div class="page-head">
            <h1>Change password</h1>
            <p>Choose a strong password you don't use anywhere else.</p>
        </div>

        <div class="card card-narrow">
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form action="/change_password" method="POST">
                <div class="field">
                    <label for="current_password">Current password</label>
                    <input type="password" id="current_password" name="current_password" placeholder="••••••••" required>
                </div>
                <div class="field">
                    <label for="new_password">New password</label>
                    <input type="password" id="new_password" name="new_password" placeholder="••••••••" required>
                </div>
                <div class="field">
                    <label for="confirm_password">Confirm new password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Update password</button>
            </form>
        </div>
    </div>
</body>
</html>
