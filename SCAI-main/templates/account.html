<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — SCAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/scai.css">
    <style>
        .profile { display: flex; align-items: center; gap: 16px; padding: 22px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 28px; }
        .profile h2 { font-size: 1.1rem; font-weight: 600; }
        .profile p { color: var(--dim); font-size: 0.85rem; }
        .email-form { display: flex; gap: 8px; margin-top: 8px; }
        .email-form input { flex: 1; }
        .email-form .btn { width: auto; padding: 10px 22px; font-size: 0.85rem; }
        .logout { margin-top: 8px; }
        .logout .setting-row { color: var(--red); }
        .logout .setting-row svg { color: var(--red); }
    </style>
</head>
<body>
    <div class="topbar">
        <a class="brand" href="{{ url_for('index') }}">
            <img src="/static/img/logo.png" alt="SCAI">
            <div><strong>SCAI</strong><span>Standards &amp; Codes AI</span></div>
        </a>
        <a class="back" href="{{ url_for('index') }}">← Back to chat</a>
    </div>

    <div class="page" style="max-width: 640px;">
        <div class="page-head">
            <h1>Account settings</h1>
            <p>Manage your profile, security, and preferences.</p>
        </div>

        <div class="profile">
            <div class="avatar">{{ user.username[0] }}</div>
            <div>
                <h2>{{ user.username }}</h2>
                <p>{{ user.email }}</p>
            </div>
        </div>

        <div class="setting-group">
            <h3>Security</h3>
            <a class="setting-row" href="{{ url_for('change_password') }}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span class="grow">Change password</span>
                <span class="chev">›</span>
            </a>
            <div class="setting-row" style="display: block;">
                <form class="email-form" action="{{ url_for('change_email') }}" method="post">
                    <input type="email" name="new_email" placeholder="New email address" required>
                    <button type="submit" class="btn">Update</button>
                </form>
            </div>
        </div>

        <div class="setting-group">
            <h3>Help &amp; legal</h3>
            <a class="setting-row" href="{{ url_for('support') }}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3M12 17h.01"/></svg>
                <span class="grow">Support &amp; feedback</span>
                <span class="chev">›</span>
            </a>
            <a class="setting-row" href="{{ url_for('terms') }}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                <span class="grow">Terms &amp; conditions</span>
                <span class="chev">›</span>
            </a>
            <a class="setting-row" href="{{ url_for('privacy') }}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span class="grow">Privacy policy</span>
                <span class="chev">›</span>
            </a>
        </div>

        <div class="logout">
            <a class="setting-row" href="{{ url_for('logout') }}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                <span class="grow">Log out</span>
            </a>
        </div>
    </div>
</body>
</html>
