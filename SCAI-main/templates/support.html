<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — SCAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/scai.css">
    <style>
        .contact-info { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--dim); }
        .contact-info a { color: var(--blue); text-decoration: none; }
        .contact-info a:hover { text-decoration: underline; }
        #feedback_confirmation { display: none; }
    </style>
</head>
<body>
    <div class="topbar">
        <a class="brand" href="{{ url_for('index') }}">
            <img src="/static/img/logo.png" alt="SCAI">
            <div><strong>SCAI</strong><span>Standards &amp; Codes AI</span></div>
        </a>
        <a class="back" href="{{ url_for('index') }}">← Back to chat</a>
    </div>

    <div class="page">
        <div class="page-head">
            <h1>Support &amp; feedback</h1>
            <p>Found a bug, missing a feature, or need a hand? Tell us.</p>
        </div>

        <div class="card card-narrow">
            <div id="feedback_confirmation" class="success">Thank you for your feedback! We will review it shortly.</div>
            <form id="feedbackForm" method="POST">
                <div class="field">
                    <label for="feedbackMessage">Your message</label>
                    <textarea name="message" id="feedbackMessage" rows="5" placeholder="Tell us what's on your mind…" required></textarea>
                </div>
                <button type="submit" class="btn">Send feedback</button>
            </form>
            <div class="contact-info">
                Prefer email? Reach us at <a href="mailto:suggestions@scai.co">suggestions@scai.co</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function (event) {
            event.preventDefault();
            fetch('/support', {
                method: 'POST',
                body: new FormData(this)
            }).then(response => {
                if (response.ok) {
                    document.getElementById('feedback_confirmation').style.display = 'block';
                    document.getElementById('feedbackMessage').value = '';
                    setTimeout(() => {
                        document.getElementById('feedback_confirmation').style.display = 'none';
                    }, 5000);
                }
            });
        });
    </script>
</body>
</html>
